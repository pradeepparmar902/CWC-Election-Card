<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Master Admin</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001C6B">
    <link rel="apple-touch-icon" href="logo192.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #001C6B;
            margin-top: 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: #001C6B;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 28, 107, 0.2);
        }

        button {
            background-color: #001C6B;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background-color: #00134a;
        }

        button:disabled {
            background-color: #888;
            cursor: not-allowed;
        }

        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            padding: 10px;
            border-radius: 4px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            background: #e2e3e5;
            color: #383d41;
            border: 1px solid #d6d8db;
            font-size: 0.85rem;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Cloud Sync Admin Panel</h1>

        <div class="info">
            <b>Database Note:</b> By saving the Master Sync ID here, every team member who opens the main ID card
            website will immediately load the correct Google system without needing to enter anything.
        </div>

        <label for="masterId"><strong>Master Sync Config Sheet ID / URL:</strong></label>
        <input type="text" id="masterId" placeholder="Paste the Master Google Sheet URL here">

        <button id="saveBtn">Save Link to Cloud Database</button>
        <div id="status" style="display: none;"></div>

        <div style="margin-top:20px; text-align:center;">
            <a href="index.html"
                style="color: #001C6B; text-decoration: none; font-size: 14px; font-weight: bold;">&larr; Return to ID
                Designer</a>
        </div>
    </div>

    <!-- Firebase System -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA1-QWSGJZPjB0P-cVeOoqvDj_1xqURMo",
            authDomain: "mmp-cwc-election-card.firebaseapp.com",
            projectId: "mmp-cwc-election-card",
            storageBucket: "mmp-cwc-election-card.firebasestorage.app",
            messagingSenderId: "870920667033",
            appId: "1:870920667033:web:d0f2d4cae50568bede5d08",
            measurementId: "G-E04MZT89TJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const settingsDoc = doc(db, 'settings', 'masterConfig');
        const masterInput = document.getElementById('masterId');
        const statusText = document.getElementById('status');
        const saveBtn = document.getElementById('saveBtn');

        const showMessage = (msg, type) => {
            statusText.innerText = msg;
            statusText.className = type;
            statusText.style.display = 'block';
        };

        // Load existing
        getDoc(settingsDoc).then((docSnap) => {
            if (docSnap.exists()) {
                masterInput.value = docSnap.data().sheetId;
            }
        }).catch(err => {
            console.error("Firestore Error:", err);
            showMessage("Database Access Error. Did you set Firestore Security Rules?", "error");
        });

        saveBtn.onclick = async () => {
            saveBtn.disabled = true;
            saveBtn.innerHTML = "Saving to Database...";
            statusText.style.display = "none";

            let val = masterInput.value.trim();
            if (!val) {
                showMessage("Please enter a link or ID first.", "error");
                saveBtn.disabled = false;
                saveBtn.innerHTML = "Save Link to Cloud Database";
                return;
            }

            // Extract ID if user pasted full URL
            if (val.includes('/spreadsheets/d/')) {
                val = val.split('/spreadsheets/d/')[1].split('/')[0];
            }

            try {
                await setDoc(settingsDoc, { sheetId: val });
                showMessage("Successfully synced! All team members are now updated.", "success");
                masterInput.value = val;
            } catch (error) {
                console.error("Error writing document: ", error);
                showMessage("Error! Permission Denied. You must update Firestore Security Rules to 'true'.", "error");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = "Save Link to Cloud Database";
            }
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
